<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0a0a14"/>
    </linearGradient>
    <linearGradient id="rust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f74c00"/>
      <stop offset="100%" style="stop-color:#b7410e"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes tick { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    .second-hand { animation: tick 60s linear infinite; transform-origin: 128px 105px; }
    .minute-hand { animation: tick 3600s linear infinite; transform-origin: 128px 105px; }
    .ring { animation: pulse 3s ease-in-out infinite; }
  </style>
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="url(#rust)" stroke-width="3"/>
  <!-- Clock face -->
  <circle cx="128" cy="105" r="60" fill="none" stroke="#f74c00" stroke-width="2" opacity="0.6"/>
  <circle cx="128" cy="105" r="3" fill="#f74c00"/>
  <!-- Hour markers -->
  <line x1="128" y1="48" x2="128" y2="55" stroke="#f74c00" stroke-width="2"/>
  <line x1="128" y1="155" x2="128" y2="162" stroke="#f74c00" stroke-width="2"/>
  <line x1="68" y1="105" x2="75" y2="105" stroke="#f74c00" stroke-width="2"/>
  <line x1="181" y1="105" x2="188" y2="105" stroke="#f74c00" stroke-width="2"/>
  <!-- Hands -->
  <line class="minute-hand" x1="128" y1="105" x2="128" y2="60" stroke="#aab" stroke-width="2" stroke-linecap="round"/>
  <line class="second-hand" x1="128" y1="105" x2="128" y2="55" stroke="#f74c00" stroke-width="1" stroke-linecap="round"/>
  <!-- Static hour hand -->
  <line x1="128" y1="105" x2="150" y2="82" stroke="#ddd" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Calendar grid hint -->
  <g class="ring" opacity="0.4">
    <rect x="68" y="168" width="120" height="3" rx="1" fill="#f74c00"/>
    <rect x="68" y="174" width="120" height="3" rx="1" fill="#f74c00" opacity="0.6"/>
    <rect x="68" y="180" width="120" height="3" rx="1" fill="#f74c00" opacity="0.3"/>
  </g>
  <text x="128" y="210" font-family="monospace" font-size="24" font-weight="bold" fill="url(#rust)" text-anchor="middle" letter-spacing="3">tock</text>
  <text x="128" y="228" font-family="monospace" font-size="8" fill="#888" text-anchor="middle">terminal calendar</text>
</svg>
